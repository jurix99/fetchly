name: Release (semver)

# Cuts a versioned release. Two ways in:
#   1. Push a git tag  v1.2.3        (e.g. `git tag v1.2.3 && git push --tags`)
#   2. Run this workflow manually (workflow_dispatch) with a version input.
# Both publish semver image tags (1.2.3, 1.2, 1, and "latest" for stable
# releases) to GHCR and create a GitHub Release. The dispatch path also creates
# the matching git tag so history stays consistent.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to release, without the leading v (e.g. 1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fetchly

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag + GitHub Release
      packages: write # push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: v
        # From the git tag on a tag push, or from the input on a manual run.
        # Validates strict semver and derives the major / major.minor pointers.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::'$VERSION' is not a valid semver (expected X.Y.Z[-pre])"
            exit 1
          fi
          PRERELEASE=false
          case "$VERSION" in *-*) PRERELEASE=true ;; esac
          CORE="${VERSION%%-*}"
          MAJOR="${CORE%%.*}"
          MINOR="${CORE%.*}"
          {
            echo "version=$VERSION"
            echo "major=$MAJOR"
            echo "minor=$MINOR"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Moving major / major.minor / latest only advance for stable releases,
          # never for a prerelease (-rc, -beta, …).
          tags: |
            type=raw,value=${{ steps.v.outputs.version }}
            type=raw,value=${{ steps.v.outputs.minor }},enable=${{ steps.v.outputs.prerelease == 'false' }}
            type=raw,value=${{ steps.v.outputs.major }},enable=${{ steps.v.outputs.prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.v.outputs.prerelease == 'false' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # On a tag push this is the existing tag; on a manual run it creates it.
          tag_name: v${{ steps.v.outputs.version }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.v.outputs.prerelease == 'true' }}
