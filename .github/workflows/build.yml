name: Build (main)

# Trunk-based CI: every push to main builds the image and publishes it under an
# immutable commit-hash tag (sha-<short>) plus the moving "edge" tag, so any
# main commit is pullable/testable without cutting a release. Pull requests are
# built for sanity but never pushed. Semver images come from release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Published as ghcr.io/<owner>/fetchly
  IMAGE_NAME: ${{ github.repository_owner }}/fetchly

# One in-flight build per ref; newer pushes cancel stale runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login for PRs (built for sanity only, never pushed).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Immutable, per-commit: ghcr.io/<owner>/fetchly:sha-<short>
            type=sha
            # Moving pointer to the newest main build.
            type=raw,value=edge,enable={{is_default_branch}}
            # The branch name (i.e. "main").
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
